[server]
bind = "0.0.0.0:8080"
# Maximum concurrent in-flight requests before 503 is returned.
# Set to ~2× expected concurrent in-flight at target RPS.
max_concurrency = 2000
# Warmup must complete before readiness probe returns 200.
warmup_enabled = true

[telemetry]
otlp_endpoint = "http://localhost:4318"
# Fraction of successful fast bids sampled for tracing (0.0–1.0).
# Errors and SLA violations are always sampled at 100%.
success_sample_rate = 0.01
# "json" for Loki-compatible structured output; "pretty" for local dev.
log_format = "json"
service_name = "bidder"

[metrics]
# Prometheus exposition endpoint.
bind = "0.0.0.0:9090"

[postgres]
url = "postgres://bidder:bidder@localhost:5432/bidder"
max_connections = 8
min_connections = 2
acquire_timeout_ms = 2000
idle_timeout_secs = 600
max_lifetime_secs = 1800

[redis]
url = "redis://localhost:6379"
# Round-robin pool size. Default num_cpus; tune at Phase 3 checkpoint via samply.
# Overridable via BIDDER__REDIS__POOL_SIZE env var.
pool_size = 0    # 0 means "use num_cpus at runtime"
# User-segment cache: moka W-TinyLFU, async.
segment_cache_capacity = 500000
segment_cache_ttl_secs = 60

[catalog]
# Full rebuild every 60s; old catalog stays live on failure.
refresh_interval_secs = 60
# Opens alert circuit after this many consecutive rebuild failures.
max_consecutive_failures = 3

[pipeline]
# Maximum candidates kept per impression after CandidateLimitStage.
# Tune based on scoring latency profiling; 20 is sufficient for Phase 4.
max_candidates_per_imp = 20

[freq_cap]
# Concurrent Redis EVAL workers for impression counter writes.
impression_workers = 2

[kafka]
brokers = "localhost:9092"
events_topic = "bidder.events.v1"
# rdkafka internal queue depth. Overflow drops newest per drop_policy.
queue_capacity = 100000
# Background send timeout; never blocks the bid path.
send_timeout_ms = 50
# newest | oldest | random_sample | incident_mode
# incident_mode auto-activates at sustained >1% drop rate.
drop_policy = "newest"

# Per-stage latency budgets in milliseconds (p99 alert threshold).
# Stages that exceed their budget emit a counter and trigger an alert.
[latency_budget]
http_parse_ms        = 2
request_validate_ms  = 1
user_enrichment_ms   = 8
candidate_retrieval_ms = 1
candidate_limit_ms   = 1
scoring_ms           = 1
frequency_cap_ms     = 8
ranking_ms           = 1
budget_pacing_ms     = 1
response_build_ms    = 1
# Hard pipeline deadline — requests exceeding this return 204 immediately.
pipeline_deadline_ms = 40
# HTTP-layer timeout — axum layer enforces this as the absolute ceiling.
http_timeout_ms      = 50
# Win-notice endpoint timeout — longer than bid path; not latency-critical.
win_timeout_ms       = 500
