name: CI

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y libcurl4-openssl-dev
      - name: Install ONNX Runtime
        run: bash tools/install-onnxruntime.sh
      - name: Source ORT_DYLIB_PATH
        run: |
          source tools/setup-ort-env.sh
          echo "ORT_DYLIB_PATH=$ORT_DYLIB_PATH" >> $GITHUB_ENV
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo build --release --all-features
      - run: cargo test --release --all-features
      - run: cargo bench --no-run --all-features
