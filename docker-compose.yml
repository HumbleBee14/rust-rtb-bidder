# Local-dev infrastructure stack for the rust-rtb-bidder project.
#
# The bidder process itself is NOT in this file — `cargo run` connects to
# these services on localhost. Production deploys use the same images via
# Helm/K8s (Phase 7); this compose stack is for dev/test/profiling only.
#
# Usage:
#   docker compose up -d                  # start postgres + redis
#   docker compose ps                     # see status
#   docker compose logs -f redis          # tail one service
#   docker compose down                   # stop everything (named volumes kept)
#   docker compose down -v                # also remove named volumes (full reset)
#
# Or via make targets: stack-up / stack-down / stack-reset.
#
# All services use the project name `bidder-stack` (override with -p) so they
# group under a single label in Docker Desktop.

name: bidder-stack

# Local-dev observability — Prometheus scrapes the bidder process running
# on the host (NOT in compose), Grafana visualises the metrics with a pre-
# provisioned dashboard. Open http://localhost:3000 (no auth) for the
# `bidder` folder → "Bidder — Live" dashboard.
#
# Why on the host: the bidder is the unit under test; samply / tokio-console
# attach more cleanly to a host-native binary than to a containerised one.

services:
  postgres:
    image: postgres:16-alpine
    container_name: bidder-postgres
    environment:
      POSTGRES_USER: bidder
      POSTGRES_PASSWORD: bidder
      POSTGRES_DB: bidder
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidder -d bidder"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: bidder-redis
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  prometheus:
    image: prom/prometheus:latest
    container_name: bidder-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
      - "--web.enable-lifecycle"
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Linux Docker doesn't resolve host.docker.internal by default; this
      # adds it. macOS Docker Desktop already provides the alias and ignores
      # this directive.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: bidder-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
